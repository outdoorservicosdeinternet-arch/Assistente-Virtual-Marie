<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Marie - IA Outdoor</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #4a6cf7; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.1em; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fdfdfd; }
        .message { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; max-width: 80%; word-wrap: break-word; }
        .user { background-color: #4a6cf7; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background-color: #e9e9eb; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        #input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; }
        input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        input:focus { border-color: #4a6cf7; }
        button { background-color: #4a6cf7; color: white; border: none; padding: 10px 20px; margin-left: 8px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #3551c7; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Assistente Virtual Marie</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
        <button id="sendBtn">Enviar</button>
    </div>
</div>

<script>
    // URL DE PRODUÇÃO (Lembre-se de manter o ngrok aberto)
    const N8N_URL = "https://gnawable-well-ramona.ngrok-free.dev/webhook/fabf9119-d3c2-4094-b36c-65eb7770031c";

    // GERAÇÃO DE SESSION ID ÚNICO POR NAVEGADOR
    let sessionId = localStorage.getItem('marie_session_id');
    if (!sessionId) {
        sessionId = 'sessao_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('marie_session_id', sessionId);
    }

    const messagesDiv = document.getElementById("messages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, side) {
        const div = document.createElement("div");
        div.classList.add("message", side);
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, "user");
        userInput.value = "";
        userInput.disabled = true;
        sendBtn.disabled = true;

        try {
            const response = await fetch(N8N_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: text,
                    sessionId: sessionId 
                })
            });

            if (!response.ok) throw new Error("Erro na resposta do servidor");

            const data = await response.json();
            
            // Aceita tanto 'reply' quanto o padrão 'output' do Agente de IA
            const botReply = data.reply || data.output || "Marie recebeu, mas a resposta veio vazia.";
            addMessage(botReply, "bot");

        } catch (error) {
            console.error(error);
            addMessage("Erro de conexão. Verifique se o n8n e o ngrok estão ativos.", "bot");
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };

    // Mensagem de boas-vindas
    window.onload = () => {
        addMessage("Olá! Eu sou a Marie. Como posso ajudar você hoje?", "bot");
    };
</script>

</body>
</html>
