<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Chat IA - Marie</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #4a6cf7; color: white; padding: 15px; font-size: 18px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f7f7f7; }
        .message { margin-bottom: 12px; max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .user { background: #4a6cf7; color: white; margin-left: auto; }
        .bot { background: #e4e6eb; color: black; }
        .chat-input { display: flex; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; border: none; padding: 12px; font-size: 14px; outline: none; }
        .chat-input button { background: #4a6cf7; border: none; color: white; padding: 12px 18px; cursor: pointer; }
        .chat-input button:hover { background: #3955c8; }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Assistente Virtual Marie</div>
    <div class="chat-messages" id="chat"></div>
    <div class="chat-input">
        <input id="msg" placeholder="Digite sua mensagem..." />
        <button id="btn-enviar">Enviar</button>
    </div>
</div>

<script>
    // URL do seu Webhook n8n via ngrok conforme as imagens fornecidas
    const API_URL = "https://gnawable-well-ramona.ngrok-free.dev/webhook-test/fabf9119-d3c2-4094-b36c-65eb7770031c";

    const chatContainer = document.getElementById("chat");
    const inputMsg = document.getElementById("msg");
    const btnEnviar = document.getElementById("btn-enviar");

    function adicionarMensagem(texto, classe) {
        const div = document.createElement("div");
        div.classList.add("message", classe);
        div.innerText = texto;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function enviar() {
        const mensagem = inputMsg.value.trim();
        if (mensagem === "") return;

        adicionarMensagem(mensagem, "user");
        inputMsg.value = "";
        
        // Desativa campos durante o processamento
        inputMsg.disabled = true;
        btnEnviar.disabled = true;

        // Indicador de "digitando"
        const typingIndicator = document.createElement("div");
        typingIndicator.classList.add("message", "bot");
        typingIndicator.innerText = "Marie está pensando...";
        chatContainer.appendChild(typingIndicator);

        try {
            const resposta = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: mensagem }) // Envia campo 'message' esperado pelo n8n
            });

            if (!resposta.ok) throw new Error("Erro na rede ou URL expirada.");

            const data = await resposta.json();
            typingIndicator.remove();

            // Lógica para capturar a resposta independente do nome do campo no n8n
            const textoResposta = data.reply || data.output || data.text || "Desculpe, não consegui processar sua resposta.";
            adicionarMensagem(textoResposta, "bot");

        } catch (error) {
            console.error("Erro:", error);
            typingIndicator.remove();
            adicionarMensagem("Erro ao conectar com o servidor. Verifique se o ngrok e o n8n estão ativos.", "bot");
        } finally {
            inputMsg.disabled = false;
            btnEnviar.disabled = false;
            inputMsg.focus();
        }
    }

    btnEnviar.onclick = enviar;
    inputMsg.onkeypress = (e) => { if (e.key === 'Enter') enviar(); };
</script>

</body>
</html>
